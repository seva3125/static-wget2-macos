name: Build static wget2

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      publish-release:
        description: Replace the public latest release after all tests pass
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: static-wget2-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build native executable
        uses: ./
        with:
          output: dist/wget2-${{ matrix.arch }}

      - name: Test native executable
        run: scripts/test.sh dist/wget2-${{ matrix.arch }}

      - name: Write native checksum
        working-directory: dist
        run: shasum -a 256 wget2-${{ matrix.arch }} > wget2-${{ matrix.arch }}.sha256

      - name: Upload native artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wget2-${{ matrix.arch }}
          path: |
            dist/wget2-${{ matrix.arch }}
            dist/wget2-${{ matrix.arch }}.sha256
          if-no-files-found: error
          retention-days: 14

  package:
    name: Package universal binary
    needs: build
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download native artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wget2-*
          path: native
          merge-multiple: true

      - name: Create and test universal executable
        shell: bash
        run: |
          set -euo pipefail
          source scripts/lib.sh
          mkdir -p dist
          lipo -create native/wget2-arm64 native/wget2-x86_64 -output dist/wget2
          chmod 0755 dist/wget2
          codesign --force --sign - dist/wget2
          assert_architecture dist/wget2 arm64
          assert_architecture dist/wget2 x86_64
          assert_system_linkage dist/wget2
          scripts/test.sh dist/wget2
          (cd dist && shasum -a 256 wget2 > SHA256SUMS)

      - name: Upload universal artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wget2-macos-universal
          path: |
            dist/wget2
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish tested release
    needs: package
    if: github.event_name == 'workflow_dispatch' && inputs.publish-release && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download tested universal artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wget2-macos-universal
          path: dist

      - name: Verify downloaded artifact checksum
        run: (cd dist && sha256sum --check SHA256SUMS)

      - name: Create or refresh latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          source versions.env
          release_tag="wget2-$WGET2_VERSION_DEFAULT-openssl-$OPENSSL_VERSION_DEFAULT-zlib-$ZLIB_VERSION_DEFAULT"
          release_title="wget2 $WGET2_VERSION_DEFAULT for macOS"
          release_notes="Universal macOS wget2 binary built from wget2 $WGET2_VERSION_DEFAULT, OpenSSL $OPENSSL_VERSION_DEFAULT, and zlib $ZLIB_VERSION_DEFAULT. Includes arm64 and x86_64 slices and requires macOS 13.0 or newer."

          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release upload "$release_tag" dist/wget2 dist/SHA256SUMS --clobber
            gh release edit "$release_tag" \
              --title "$release_title" \
              --notes "$release_notes" \
              --latest
          else
            gh release create "$release_tag" \
              'dist/wget2#Universal macOS wget2 binary (arm64 + x86_64)' \
              'dist/SHA256SUMS#SHA-256 checksum' \
              --target "$GITHUB_SHA" \
              --title "$release_title" \
              --notes "$release_notes" \
              --latest
          fi
