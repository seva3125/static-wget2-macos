name: Build static wget2 for macOS
description: Build a single-file wget2 executable with static third-party libraries on macOS
author: seva3125

inputs:
  output:
    description: Output path for the native wget2 executable
    required: false
    default: dist/wget2
  deployment-target:
    description: Minimum macOS deployment target
    required: false
    default: "13.0"
  wget2-version:
    description: wget2 source version; empty uses the tracked latest release
    required: false
    default: ""
  wget2-sha256:
    description: SHA-256 of the wget2 source archive; empty uses the tracked digest
    required: false
    default: ""
  openssl-version:
    description: OpenSSL source version; empty uses the tracked latest release
    required: false
    default: ""
  openssl-sha256:
    description: SHA-256 of the OpenSSL source archive; empty uses the tracked digest
    required: false
    default: ""
  zlib-version:
    description: zlib source version; empty uses the tracked latest release
    required: false
    default: ""
  zlib-sha256:
    description: SHA-256 of the zlib source archive; empty uses the tracked digest
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Compile wget2 and its static dependencies
      shell: bash
      env:
        WGET2_VERSION: ${{ inputs.wget2-version }}
        WGET2_SHA256: ${{ inputs.wget2-sha256 }}
        OPENSSL_VERSION: ${{ inputs.openssl-version }}
        OPENSSL_SHA256: ${{ inputs.openssl-sha256 }}
        ZLIB_VERSION: ${{ inputs.zlib-version }}
        ZLIB_SHA256: ${{ inputs.zlib-sha256 }}
        MACOSX_DEPLOYMENT_TARGET: ${{ inputs.deployment-target }}
        STATIC_WGET2_OUTPUT: ${{ inputs.output }}
      run: '"${{ github.action_path }}/scripts/build.sh" "$STATIC_WGET2_OUTPUT"'

branding:
  icon: download-cloud
  color: blue
